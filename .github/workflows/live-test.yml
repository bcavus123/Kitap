name: Live Test (gerçek API)

# Elle tetiklenir (Actions sekmesi → Run workflow). GERÇEK Anthropic API çağırır → maliyet doğurur.
# Gerekli secret: ANTHROPIC_API_KEY (repo Settings → Secrets and variables → Actions).
on:
  workflow_dispatch:

jobs:
  live:
    name: Gerçek Claude ile bölüm üret
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kitap_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/kitap_db
      ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/kitap_db
      ALEMBIC_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/kitap_db
      SECRET_KEY: live-test-secret
      # Semantik hafıza kapalı → yalnızca ANTHROPIC_API_KEY yeterli (embedding için OPENAI gerekmez)
      SEMANTIC_MEMORY_ENABLED: "false"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: claude-sonnet-4-6

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Şema (alembic upgrade head)
        run: alembic upgrade head

      - name: Canlı üretim (gerçek Claude)
        run: python scripts/live_smoke.py
