name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: pytest (PostgreSQL + pgvector)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kitap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Testler kitap_test'e bağlanır; CI'da servis localhost'ta yayında.
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/kitap_test
      SECRET_KEY: ci-test-secret-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: WeasyPrint sistem bağımlılıkları (PDF üretimi)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 libcairo2 libgdk-pixbuf-2.0-0 \
            libffi-dev shared-mime-info fonts-dejavu-core

      - name: Bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Testler (20 test)
        run: |
          set -o pipefail
          pytest -rA --tb=short 2>&1 | tee pytest-output.txt

      - name: Hata teşhisi (annotation — sadece fail'de)
        if: failure()
        run: python scripts/ci_annotate.py
